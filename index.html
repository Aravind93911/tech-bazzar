<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechBazaar - Electronics Store</title>
<style>
    /* CSS Styles - Maintained for UI Consistency */
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--pri:#6c5ce7;--pri2:#5a4bd1;--sec:#00cec9;--red:#d63031;--grn:#00b894;--yel:#fdcb6e;--dk:#2d3436;--gy:#636e72;--lt:#dfe6e9;--bg:#f5f6fa;--card:#fff;--sh:0 2px 16px rgba(0,0,0,.08)}
    html,body{width:100%;height:100%;overflow-x:hidden}
    body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--dk)}
    .hidden{display:none!important}
    a{cursor:pointer}
    nav{background:linear-gradient(135deg,var(--pri),var(--pri2));color:#fff;padding:0 30px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:1000;box-shadow:0 2px 20px rgba(108,92,231,.3)}
    .logo{font-size:1.35em;font-weight:800;cursor:pointer;letter-spacing:-.5px}
    .logo span{color:var(--yel)}
    .nav-links{display:flex;gap:4px;align-items:center}
    .nav-links a{color:rgba(255,255,255,.85);text-decoration:none;font-size:.88em;padding:8px 16px;border-radius:8px;transition:.2s;display:flex;align-items:center;gap:6px}
    .nav-links a:hover{background:rgba(255,255,255,.15);color:#fff}
    .cart-link{position:relative}
    .cart-badge{position:absolute;top:2px;right:2px;background:var(--red);border-radius:50%;min-width:18px;height:18px;font-size:.68em;display:flex;align-items:center;justify-content:center;font-weight:700}
    .mob-toggle{display:none;background:none;border:none;color:#fff;font-size:1.5em;cursor:pointer}
    .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#6c5ce7 0%,#a29bfe 50%,#6c5ce7 100%);background-size:200% 200%;animation:gradShift 8s ease infinite;padding:20px}
    @keyframes gradShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
    .auth-card{background:#fff;border-radius:20px;padding:40px 36px;width:440px;max-width:100%;box-shadow:0 25px 80px rgba(0,0,0,.2)}
    .auth-card h2{text-align:center;margin-bottom:24px;color:var(--pri);font-size:1.6em}
    .auth-tabs{display:flex;margin-bottom:24px;border-radius:12px;overflow:hidden;border:2px solid var(--pri)}
    .auth-tabs button{flex:1;padding:11px;border:none;cursor:pointer;font-weight:700;font-size:.92em;transition:.2s;background:#fff;color:var(--pri)}
    .auth-tabs button.on{background:var(--pri);color:#fff}
    .field{margin-bottom:16px}
    .field label{display:block;margin-bottom:5px;font-size:.82em;font-weight:600;color:var(--gy)}
    .field input,.field select,.field textarea{width:100%;padding:11px 15px;border:2px solid var(--lt);border-radius:10px;font-size:.92em;outline:none;transition:.2s;font-family:inherit}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(108,92,231,.1)}
    .btn{padding:11px 24px;border:none;border-radius:10px;cursor:pointer;font-weight:700;font-size:.9em;transition:.2s;display:inline-flex;align-items:center;gap:6px;font-family:inherit}
    .btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.15)}
    .bp{background:var(--pri);color:#fff}.br{background:var(--red);color:#fff}.bg{background:var(--grn);color:#fff}.bs{background:var(--gy);color:#fff}.bw{background:var(--yel);color:var(--dk)}
    .btn-full{width:100%;justify-content:center;padding:13px}
    .alert-box{padding:11px 16px;border-radius:10px;margin-bottom:16px;font-size:.85em;display:none;font-weight:500}
    .alert-box.err{display:block;background:#ffe0e0;color:#c0392b;border:1px solid #fab1a0}
    .page{max-width:1400px;margin:0 auto;padding:28px 32px}
    .hero{background:linear-gradient(135deg,#6c5ce7,#a29bfe);border-radius:24px;padding:48px 36px;color:#fff;text-align:center;margin-bottom:32px;position:relative}
    .search-wrap{display:flex;max-width:520px;margin:0 auto;position:relative;z-index:1}
    .search-wrap input{flex:1;padding:13px 22px;border:none;border-radius:30px 0 0 30px;outline:none}
    .search-wrap button{padding:13px 28px;border:none;background:var(--yel);border-radius:0 30px 30px 0;cursor:pointer}
    .cats{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:28px}
    .cat{padding:9px 20px;background:var(--card);border:2px solid var(--lt);border-radius:25px;cursor:pointer;font-weight:600}
    .cat.on{background:var(--pri);color:#fff}
    .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px}
    .pcard{background:var(--card);border-radius:16px;overflow:hidden;box-shadow:var(--sh);transition:.25s;cursor:pointer}
    .pcard:hover{transform:translateY(-5px)}
    .pcard-img{height:180px;display:flex;align-items:center;justify-content:center;font-size:5em;background:#f8f9fa}
    .pcard-body{padding:16px}
    .price{color:var(--pri);font-weight:800;font-size:1.2em}
    .atc-btn{width:100%;padding:9px;margin-top:10px;background:var(--pri);color:#fff;border:none;border-radius:10px;cursor:pointer;font-weight:700}
    .adm-wrap{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 56px)}
    .adm-side{background:var(--dk);color:#fff;padding:20px 14px}
    .adm-side a{display:flex;align-items:center;gap:10px;padding:12px 16px;color:#b2bec3;text-decoration:none;border-radius:10px;margin-bottom:4px;font-size:.88em}
    .adm-side a.on{background:rgba(108,92,231,.3);color:#fff}
    .adm-body{padding:28px 32px;background:var(--bg)}
    .toast-wrap{position:fixed;top:68px;right:20px;z-index:3000;display:flex;flex-direction:column;gap:8px}
    .toast{padding:13px 22px;border-radius:12px;color:#fff;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.15)}
    .t-ok{background:var(--grn)}.t-err{background:var(--red)}
    #loading{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--pri);display:flex;align-items:center;justify-content:center;z-index:9999;color:#fff}
</style>
</head>
<body>

<div id="loading"><p>Loading Database...</p></div>
<div class="toast-wrap" id="TW"></div>

<div id="authPage" class="auth-wrap">
    <div class="auth-card">
        <h2>⚡ TechBazaar</h2>
        <div class="auth-tabs">
            <button class="on" onclick="authTab('login')">Login</button>
            <button onclick="authTab('register')">Register</button>
        </div>
        <div id="authMsg" class="alert-box"></div>
        <div id="loginF">
            <div class="field"><label>Email</label><input type="email" id="lEmail" placeholder="admin@tech.com"></div>
            <div class="field"><label>Password</label><input type="password" id="lPass" placeholder="Password"></div>
            <button class="btn bp btn-full" onclick="doLogin()">🔐 Login</button>
        </div>
        <div id="regF" class="hidden">
            <div class="field"><label>Full Name</label><input id="rName"></div>
            <div class="field"><label>Email</label><input type="email" id="rEmail"></div>
            <div class="field"><label>Password</label><input type="password" id="rPass"></div>
            <div class="field"><label>Phone</label><input id="rPhone"></div>
            <button class="btn bp btn-full" onclick="doRegister()">🚀 Create Account</button>
        </div>
    </div>
</div>

<div id="APP" class="hidden">
    <nav>
        <div class="logo" onclick="go('home')">⚡ Tech<span>Bazaar</span></div>
        <div class="nav-links">
            <a onclick="go('home')">🏠 Home</a>
            <a onclick="go('shop')">🛍️ Shop</a>
            <a onclick="go('cart')">🛒 Cart <span id="CB">0</span></a>
            <a onclick="go('profile')">👤 Profile</a>
            <a id="admLink" class="hidden" onclick="go('admin')">⚙️ Admin</a>
            <a onclick="logout()">🚪 Logout</a>
        </div>
    </nav>

    <div id="PG_home" class="page">
        <div class="hero"><h1>Premium Electronics</h1><p>Smartwatches · Audio · Chargers</p></div>
        <div class="pgrid" id="HG"></div>
    </div>

    <div id="PG_admin" class="page hidden">
        <div class="adm-wrap">
            <div class="adm-side">
                <a class="on" onclick="admGo('logs', this)">📋 Attack Logs</a>
                <a onclick="admGo('users', this)">👥 Users</a>
            </div>
            <div class="adm-body" id="ADM"></div>
        </div>
    </div>
</div>

<script>
// Backend URL (Use current origin if hosted together)
const API = window.location.origin; 

let D = { users:[], prods:[], cart:[], me:null, logs:[] };
let MIV = null;

// =============== INITIALIZATION ===============
async function init() {
    try {
        const data = await fetch(API + '/api/init').then(res => res.json());
        D.prods = data.prods;
        D.logs = data.logs;
        document.getElementById('loading').style.display = 'none';
        renderProducts();
    } catch (e) {
        toast('Failed to connect to server', 'err');
    }
}

// =============== SQLI CLIENT-SIDE MONITOR ===============
const checkSQLi = (input) => {
    const patterns = [/' OR '1'='1/, /UNION SELECT/i, /DROP TABLE/i, /<script>/i];
    const isBad = patterns.some(p => p.test(input));
    return {
        bad: isBad,
        input: input,
        threats: isBad ? ['Pattern Match'] : [],
        risk: isBad ? 'high' : 'none',
        confidence: isBad ? 99 : 0
    };
};

// =============== AUTH FUNCTIONS ===============
async function doLogin() {
    const email = document.getElementById('lEmail').value;
    const password = document.getElementById('lPass').value;
    const msg = document.getElementById('authMsg');

    const sqliCheck = checkSQLi(email + password);

    const res = await fetch(API + '/api/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ email, password, sqliCheck })
    }).then(r => r.json());

    if (res.success) {
        D.me = res.user;
        document.getElementById('authPage').classList.add('hidden');
        document.getElementById('APP').classList.remove('hidden');
        if (D.me.role === 'admin') document.getElementById('admLink').classList.remove('hidden');
        toast('Logged in!');
        go('home');
    } else {
        msg.className = 'alert-box err';
        msg.textContent = res.error;
    }
}

async function doRegister() {
    const data = {
        name: document.getElementById('rName').value,
        email: document.getElementById('rEmail').value,
        password: document.getElementById('rPass').value,
        phone: document.getElementById('rPhone').value
    };

    const res = await fetch(API + '/api/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    }).then(r => r.json());

    if(res.success) {
        toast('Registered! Please login.');
        authTab('login');
    } else {
        alert(res.error);
    }
}

// =============== UI NAVIGATION ===============
function go(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
    document.getElementById('PG_' + page).classList.remove('hidden');
}

function authTab(tab) {
    document.getElementById('loginF').classList.toggle('hidden', tab !== 'login');
    document.getElementById('regF').classList.toggle('hidden', tab !== 'register');
}

function renderProducts() {
    const grid = document.getElementById('HG');
    grid.innerHTML = D.prods.map(p => `
        <div class="pcard">
            <div class="pcard-img">${p.e}</div>
            <div class="pcard-body">
                <h3>${p.n}</h3>
                <p class="price">₹${p.p.toLocaleString()}</p>
                <button class="atc-btn" onclick="addCart(${p.id})">Add to Cart</button>
            </div>
        </div>
    `).join('');
}

function addCart(id) {
    D.cart.push(id);
    document.getElementById('CB').textContent = D.cart.length;
    toast('Added to cart');
}

// =============== ADMIN PANEL ===============
async function admGo(tab, el) {
    const container = document.getElementById('ADM');
    if (tab === 'logs') {
        const logs = await fetch(API + '/api/admin/logs').then(r => r.json());
        container.innerHTML = `
            <h3>Security Attack Logs</h3>
            <table style="width:100%; margin-top:20px; border-collapse: collapse;">
                <tr style="background:#2d3436; color:#fff">
                    <th style="padding:10px">Time</th><th>IP</th><th>Input</th><th>Severity</th>
                </tr>
                ${logs.map(l => `
                    <tr style="border-bottom:1px solid #ddd">
                        <td style="padding:10px">${new Date(l.t).toLocaleTimeString()}</td>
                        <td>${l.ip}</td>
                        <td><code>${l.inp}</code></td>
                        <td><span style="color:${l.sev === 'high' ? 'red' : 'green'}">${l.sev}</span></td>
                    </tr>
                `).join('')}
            </table>
        `;
    }
}

function toast(m, t='ok') {
    const e = document.createElement('div');
    e.className = `toast t-${t}`;
    e.textContent = m;
    document.getElementById('TW').appendChild(e);
    setTimeout(() => e.remove(), 3000);
}

function logout() { location.reload(); }

// Init app
init();
</script>
</body>
</html>
